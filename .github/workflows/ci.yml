# Mirrors production build: same steps Vercel should run when Root Directory = app.
# If this passes on GitHub but Vercel stays on an old commit, fix Vercel (Root Directory app, Framework Next.js).
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: next build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
